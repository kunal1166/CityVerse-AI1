<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 60" width="380" height="60" fill="none">
  <!-- CityVerse AI Enterprise Wordmark Logo -->
  <style>
    .brand-text {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }
    .brand-primary {
      fill: #0F172A;
    }
    .brand-accent {
      fill: #2563EB;
    }
    .badge-bg {
      fill: #2563EB;
    }
    .badge-text {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      font-size: 18px;
      font-weight: 800;
      fill: #FFFFFF;
      letter-spacing: 0.05em;
    }
  </style>

  <g transform="translate(10, 12)">
    <!-- Geometric Monogram / Symbol representing Smart City Nodes & AI Intelligence -->
    <g transform="translate(0, 4)">
      <!-- Left Outer Pillar -->
      <rect x="0" y="0" width="7" height="28" rx="2" fill="#0F172A" />
      <!-- Center High-Tech Node Stack -->
      <rect x="11" y="0" width="7" height="12" rx="2" fill="#2563EB" />
      <rect x="11" y="16" width="7" height="12" rx="2" fill="#0F172A" />
      <!-- Right Connecting Bar -->
      <rect x="22" y="0" width="7" height="28" rx="2" fill="#0F172A" />
      <!-- Connecting Grid Node -->
      <circle cx="14.5" cy="14" r="2" fill="#FFFFFF" />
    </g>

    <!-- Wordmark Text: "CityVerse" in Deep Navy (#0F172A) -->
    <text x="42" y="28" class="brand-text brand-primary">CityVerse</text>

    <!-- Wordmark Text: "AI" in Royal Blue (#2563EB) -->
    <g transform="translate(204, 2)">
      <!-- Blue Accent Pill for AI -->
      <rect x="0" y="2" width="42" height="28" rx="5" class="badge-bg" />
      <text x="9" y="23" class="badge-text">AI</text>
    </g>
  </g>
</svg>
